version: '3.8'

services:
  api-crawler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-crawler
    ports:
      - "8000:8000"
    volumes:
      # Mount a local ./data directory to persist database and backups on the host
      - ./data:/app/data
    env_file:
      - .env
    environment:
      # Set DATABASE_URL and BACKUPS_ROOT to point inside the persisted volume
      - DATABASE_URL=sqlite:////app/data/api_crawler.db
      - BACKUPS_ROOT=/app/data/backups
    restart: always
